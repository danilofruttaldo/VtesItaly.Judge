  <body>
    <a href="#content" class="skip">Vai alle FAQ</a>

    <div class="topbar" id="topbar">
      <header>
        <h1>FAQ</h1>
        <nav class="page-nav" aria-label="Sezioni del sito">
          <a href="./">Sanzioni</a>
          <a href="./judges.html">Judge</a>
          <a href="./faq.html" aria-current="page">FAQ</a>
          <a href="./utili.html">Link</a>
        </nav>
      </header>

      <div class="controls" role="search">
        <input
          type="search"
          id="q"
          placeholder="Cerca una domanda, una carta, un'interazione... (Ctrl+K)"
          autocomplete="off"
          aria-label="Cerca nelle FAQ (scorciatoia: Ctrl+K)"
          aria-keyshortcuts="Control+K"
          enterkeyhint="search"
        />
        <div class="meta-row">
          <span class="count" id="count" aria-live="polite"></span>
          <button class="reset" id="reset" type="button" hidden>Azzera</button>
        </div>
      </div>
    </div>

    <main id="content">
      <noscript>
        <div class="empty">Questa pagina richiede JavaScript per filtrare le FAQ.</div>
      </noscript>
      <div id="list" class="list"></div>
      <div class="empty" id="empty" role="status" aria-live="polite" hidden>
        <div id="empty-msg">Nessuna FAQ corrisponde ai filtri.</div>
        <div class="empty-actions" id="empty-actions">
          <button class="reset-empty" id="empty-reset" type="button">Azzera filtri</button>
        </div>
      </div>
      <div class="loading" id="loading">Caricamento...</div>
    </main>

    <footer class="app-footer">
      <span class="offline" id="offline" role="status" aria-live="polite" hidden>
        <span class="offline-dot" aria-hidden="true"></span>
        Offline — stai consultando i dati salvati localmente
      </span>
      <span class="sw-update" id="sw-update" hidden>
        <button class="sw-update-btn" id="sw-update-btn" type="button">Aggiornamento disponibile — ricarica</button>
      </span>
      <span class="print-source" aria-hidden="true">judge.vtesitaly.com — FAQ</span>
    </footer>
