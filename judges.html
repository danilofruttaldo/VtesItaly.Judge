  <body>
    <div class="topbar">
      <header>
        <h1>Judge</h1>
        <nav class="page-nav" aria-label="Sezioni del sito">
          <a href="./">Sanzioni</a>
          <a href="./judges.html" aria-current="page">Judge</a>
          <a href="./faq.html">FAQ</a>
          <a href="./utili.html">Link</a>
        </nav>
      </header>
    </div>

    <main class="page-main">
      <p class="page-intro">
        Snapshot dei judge VEKN italiani, aggiornato automaticamente da
        <a href="https://www.vekn.net/vekn-judges" rel="noopener noreferrer" target="_blank">vekn.net/vekn-judges</a>.
        <span class="page-intro-meta" id="judges-meta"></span>
      </p>

      <div class="loading" id="judges-loading">Caricamento...</div>
      <div class="empty" id="judges-empty" hidden>Nessun judge da mostrare.</div>

      <table class="judges-table" id="judges-table" hidden>
        <thead>
          <tr>
            <th scope="col" aria-sort="ascending">
              <button type="button" class="sort-btn" data-sort="name">
                Nome<span class="sort-ind" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="sort-btn" data-sort="rank">
                Rank<span class="sort-ind" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="sort-btn" data-sort="vekn_id">
                VEKN ID<span class="sort-ind" aria-hidden="true"></span>
              </button>
            </th>
            <th scope="col" aria-sort="none">
              <button type="button" class="sort-btn" data-sort="valid_to">
                Scadenza<span class="sort-ind" aria-hidden="true"></span>
              </button>
            </th>
          </tr>
        </thead>
        <tbody id="judges-tbody"></tbody>
      </table>
    </main>

    <footer class="app-footer">
      <span class="print-source" aria-hidden="true">judge.vtesitaly.com — Judge</span>
    </footer>
