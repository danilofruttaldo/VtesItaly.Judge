<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <!-- `frame-ancestors`, `sandbox` and `report-uri` are ignored when CSP is
         delivered via <meta>; they only work as HTTP response headers. We
         drop frame-ancestors here to silence the browser warning — clickjacking
         protection has to come from an X-Frame-Options/CSP response header
         on the host (GitHub Pages doesn't allow customising headers, so this
         is a known accepted limitation of the static deployment). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'; connect-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests"
    />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121214" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7f8" />
    <meta
      name="description"
      content="Sanzioni VTES Italia: infrazioni e penalità per arbitri di tornei, consultabili da telefono."
    />
    <link rel="canonical" href="https://judge.vtesitaly.com/" />
    <!-- Open Graph + Twitter Card: link previews on Discord/WhatsApp/social
         show a meaningful card instead of a bare URL when judges share the
         tool inside the community. The image is the same SVG used for the
         favicon — small, scalable, no extra asset to maintain. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VTES Italy Judge" />
    <meta property="og:url" content="https://judge.vtesitaly.com/" />
    <meta property="og:title" content="VTES Italy Judge — Sanzioni" />
    <meta
      property="og:description"
      content="Sanzioni VTES Italia: infrazioni e penalità per arbitri di tornei, consultabili da telefono."
    />
    <meta property="og:image" content="https://judge.vtesitaly.com/assets/vtes.svg" />
    <meta property="og:locale" content="it_IT" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VTES Italy Judge — Sanzioni" />
    <meta
      name="twitter:description"
      content="Sanzioni VTES Italia: infrazioni e penalità per arbitri di tornei, consultabili da telefono."
    />
    <meta name="twitter:image" content="https://judge.vtesitaly.com/assets/vtes.svg" />
    <link rel="icon" type="image/svg+xml" href="assets/vtes.svg" />
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>VTES Italy Judge — Sanzioni</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script type="module" src="assets/app.js"></script>
  </head>
  <body>
    <a href="#content" class="skip">Vai alle sanzioni</a>

    <div class="topbar" id="topbar">
      <header>
        <h1>Sanzioni</h1>
        <nav class="page-nav" aria-label="Sezioni del sito">
          <a href="./" aria-current="page">Sanzioni</a>
          <a href="./judges.html">Judge</a>
          <a href="./faq.html">FAQ</a>
          <a href="./utili.html">Link</a>
        </nav>
      </header>

      <div class="controls" role="search">
        <input
          type="search"
          id="q"
          placeholder="Cerca infrazione, nota, riferimento... (Ctrl+K)"
          autocomplete="off"
          aria-label="Cerca nel vademecum (scorciatoia: Ctrl+K)"
          aria-keyshortcuts="Control+K"
          enterkeyhint="search"
        />
        <div class="meta-row">
          <span class="count" id="count" aria-live="polite"></span>
          <button class="reset" id="reset" type="button" hidden>Azzera</button>
        </div>
      </div>
    </div>

    <main id="content">
      <noscript>
        <div class="empty">Questa pagina richiede JavaScript per filtrare le sanzioni.</div>
      </noscript>
      <div id="list" class="list"></div>
      <div class="empty" id="empty" role="status" aria-live="polite" hidden>
        <div>Nessuna sanzione corrisponde ai filtri.</div>
        <div class="empty-actions">
          <button class="reset-empty" id="empty-reset" type="button">Azzera filtri</button>
        </div>
      </div>
      <div class="loading" id="loading">Caricamento...</div>
    </main>

    <!-- Rule modal: populated and shown via dialog.showModal() when a judge
         clicks any rule reference (chip or inline citation). The verbatim
         VEKN text is bundled in assets/judges-guide-rules.mjs so the modal
         opens instantly and works fully offline — no Text Fragment scroll
         to a flaky external page. The "Apri su VEKN" footer link is the
         escape hatch for those who want to verify against the live source. -->
    <dialog id="rule-dialog" class="rule-dialog" aria-labelledby="rule-dialog-title">
      <div class="rule-dialog-frame">
        <header class="rule-dialog-header">
          <h2 id="rule-dialog-title" class="rule-dialog-title"></h2>
          <button class="rule-dialog-close" id="rule-dialog-close" type="button" aria-label="Chiudi">×</button>
        </header>
        <div class="rule-dialog-body" id="rule-dialog-body"></div>
        <footer class="rule-dialog-footer">
          <a class="rule-dialog-source" id="rule-dialog-source" href="#" rel="noopener noreferrer" target="_blank"
            >Apri su VEKN ↗</a
          >
        </footer>
      </div>
    </dialog>

    <footer class="app-footer">
      <span class="updated" id="updated" hidden></span>
      <span class="offline" id="offline" role="status" aria-live="polite" hidden>
        <span class="offline-dot" aria-hidden="true"></span>
        Offline — stai consultando i dati salvati localmente
      </span>
      <span class="sw-update" id="sw-update" hidden>
        <button class="sw-update-btn" id="sw-update-btn" type="button">Aggiornamento disponibile — ricarica</button>
      </span>
      <span class="print-source" aria-hidden="true">judge.vtesitaly.com — Sanzioni</span>
    </footer>
  </body>
</html>
